{% extends 'base.html' %}
{% block title %}Create a New Blog Post{% endblock %}

{% block content %}

{% if user.is_authenticated %}

    <div style="max-width: 800px; margin: 0 auto;">
        <h1 style="font-size: 32px; font-weight: 400; margin-bottom: 32px;">Add Post</h1>

        <md-outlined-card style="width: 100%; padding: 32px;">
            <form method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 16px;">
                <!-- Cross-site request forgery -->
                {% csrf_token %}
                {{ form.media }}
                {{ form.as_p }}
                
                <div style="margin-top: 16px; display: flex; justify-content: flex-end;">
                    <md-filled-button type="submit">Publish Post</md-filled-button>
                </div>
            </form>
        </md-outlined-card>
    </div>
    
    <!--JavaScript black megik-->
    <script>
        var name = "{{ user.id }}";
        var dadminField = document.getElementById("dadmin");
        if(dadminField) dadminField.value = name;
    </script>
{% else %}

<div style="text-align: center; margin-top: 64px; color: var(--md-sys-color-error);">
    <md-icon style="font-size: 48px; margin-bottom: 16px;">gpp_bad</md-icon>
    <h2 style="font-weight: 400;">You are not allowed here buddy!</h2>
</div>

{% endif %}

{% endblock %}
