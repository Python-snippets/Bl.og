{% extends 'base.html' %}

{% block title %}Bl.og categories{% endblock %}

{% block content %}

<h1 style="font-size: 32px; font-weight: 400; margin-bottom: 24px;">Bl.og Categories</h1>

<div style="display: flex; flex-direction: column; gap: 12px; max-width: 600px;">
    {% for item in cat_menu_list %}
        <md-outlined-card style="width: 100%; padding: 16px;">
            <a href="{% url 'category' item|slugify %}" style="font-size: 18px; font-weight: 500; display: flex; align-items: center; justify-content: space-between;">
                {{ item }}
                <md-icon>chevron_right</md-icon>
            </a>
        </md-outlined-card>
    {% endfor %}
</div>

{% endblock %}
