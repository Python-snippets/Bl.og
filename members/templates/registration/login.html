{% extends 'base.html' %}
{% load socialaccount %}
{% load account %}
{% block title %}Login{% endblock %}

{% block content %}

<div style="max-width: 400px; margin: 48px auto;">
    <h1 style="font-size: 32px; font-weight: 400; text-align: center; margin-bottom: 32px;">Login</h1>

    <md-outlined-card style="width: 100%; padding: 32px;">
        <form method="POST" style="display: flex; flex-direction: column; gap: 16px;">
            <!-- Cross-site request forgery -->
            {% csrf_token %}
            {{ form.as_p }}
            
            <md-filled-button type="submit" style="margin-top: 16px; width: 100%;">Login</md-filled-button>
        </form>

        <md-divider style="margin: 32px 0;"></md-divider>

        <div style="text-align: center;">
            <p style="color: var(--md-sys-color-on-surface-variant); margin-bottom: 16px;">Authenticate with</p>
            
            <md-outlined-icon-button href="{% provider_login_url 'github' %}" aria-label="Github">
                <img alt="Github" width="24px" src="https://cdn.jsdelivr.net/npm/simple-icons@v3/icons/github.svg" style="filter: invert(var(--md-sys-color-on-surface-luma, 0));"/>
            </md-outlined-icon-button>
        </div>
    </md-outlined-card>
</div>

{% endblock %}
